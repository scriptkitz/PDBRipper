name: Build PDBRipper

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    env:
      QT_VERSION: "5.15.2"
      QT_ARCH: "win64_msvc2019_64"
      BUILD_DIR: "build_output"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: ${{ env.QT_VERSION }}
        arch: ${{ env.QT_ARCH }}
        install-deps: true

    - name: Build Project
      shell: cmd
      run: |
        rem 编译 GUI 项目
        qmake
        nmake release
        
        rem 编译 Console 项目 (假设在 console_source 目录下)
        if exist console_source (
            cd console_source
            qmake
            nmake release
            cd ..
        )

    - name: Debug - List Build Files
      shell: cmd
      run: |
        echo "--- 搜索所有 exe 文件，确认生成位置 ---"
        dir /s /b *.exe
        echo "--- 打印 build 目录结构 ---"
        if exist build (
            tree /f build
        ) else (
            echo "错误: build 目录不存在！编译可能失败。"
        )

    - name: Prepare Files
      shell: cmd
      run: |
        mkdir ${{ env.BUILD_DIR }}
        
        rem 这里的路径你需要根据 Debug 步骤的输出进行调整
        rem 如果 Debug 显示文件在 build\release，就用 build\release\xxx
        if exist build\release\pdbripper.exe copy build\release\pdbripper.exe ${{ env.BUILD_DIR }}\
        if exist build\release\pdbripperc.exe copy build\release\pdbripperc.exe ${{ env.BUILD_DIR }}\
        
        rem 拷贝资源
        if exist XStyles\qss xcopy XStyles\qss ${{ env.BUILD_DIR }}\qss /E /I /Y
        if exist signatures\crypto.db xcopy signatures\crypto.db ${{ env.BUILD_DIR }}\signatures\ /Y
        if exist files\msdia140.dll copy files\msdia140.dll ${{ env.BUILD_DIR }}\

    - name: Deploy Qt Libraries
      shell: cmd
      run: |
        windeployqt ${{ env.BUILD_DIR }}\pdbripper.exe
        windeployqt ${{ env.BUILD_DIR }}\pdbripperc.exe

    - name: Upload Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: ${{ env.BUILD_DIR }}/*